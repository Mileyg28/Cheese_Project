<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Distribuidora de Quesos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 w-full max-w-sm">

        <div class="mb-8 text-center">
            <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-slate-800">Distribuidora de Quesos</h1>
            <p class="text-sm text-slate-400 mt-1">Inicia sesión para continuar</p>
        </div>

        {% if form.errors %}
        <div class="mb-4 rounded-xl bg-red-50 border border-red-200 text-red-700 px-4 py-3 text-sm">
            Usuario o contraseña incorrectos. Intenta de nuevo.
        </div>
        {% endif %}

        {% if messages %}
        {% for message in messages %}
        <div class="mb-4 rounded-xl bg-emerald-50 border border-emerald-200 text-emerald-700 px-4 py-3 text-sm">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Usuario
                </label>
                <input
                    type="text"
                    name="username"
                    autofocus
                    autocomplete="username"
                    class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
                    placeholder="tu_usuario"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Contraseña
                </label>
                <input
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    class="w-full rounded-xl border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"
                    placeholder="••••••••"
                >
            </div>

            <button
                type="submit"
                class="w-full py-2.5 rounded-xl bg-slate-900 text-white font-semibold text-sm hover:bg-slate-700 transition"
            >
                Ingresar
            </button>
        </form>
    </div>

</body>
</html>
